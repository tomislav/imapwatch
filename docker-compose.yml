services:
  imapwatch:
    image: ghcr.io/tomislav/imapwatch:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "imapwatch", "--quiet", "status"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    volumes:
      - ./imapwatch.yml:/app/imapwatch.yml:ro
